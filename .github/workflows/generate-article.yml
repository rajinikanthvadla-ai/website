name: Auto-Generate AI News Article

on:
  schedule:
    # Runs every day at 6 AM UTC (11:30 AM IST)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "Topic for the article (leave empty for auto-pick)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-article.js "${{ github.event.inputs.topic || '' }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/articles.json src/app/sitemap.ts
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-generate daily AI news article"
            git push
          fi
